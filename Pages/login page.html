<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation - Restricted Access</title>
    <link rel="stylesheet" href="../CSS/Login%20page/login%20page.css">
</head>

<body>

    <div class="Main-Container">

        <div class="Graphic-Container">

            <div id="scp-logo-graphic"></div>

            <div id="warning-screen" class="active">
                <p id="line-one" data-text="WARNING: THE FOUNDATION DATABASE IS"></p>
                <br>
                <h1 id="line-two" data-text="CLASSIFIED"></h1>
                <p id="line-three" class="sub-text" data-text="ACCESS BY UNAUTHORIZED PERSONNEL IS STRICTLY PROHIBITED PERPETRATORS WILL BE TRACKED, LOCATED, AND DETAINED"></p>
                <br>
                <button id="access-button" class="button-outline">ACCESS DATABASE</button>
            </div>

            <div id="login-screen">
                <img src="../Media/Images/Login%20Background/SCP%20Logo.png" alt="SCP Foundation Logo" class="login-logo">
                <h2 class="login-subtitle">SECURE ACCESS INITIATED</h2>
                <form class="login-credentials" action="landing%20page.html">
                    <input type="password" maxlength="8" autocomplete="off" placeholder="PASSWORD"><button type="submit" class="login-button-icon">⏻</button>
                </form>
            </div>

        </div>

    </div>

    <script src="../JS/Login%20page/Login%20page.js"></script>

</html>
